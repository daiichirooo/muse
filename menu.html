<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muse - Menu</title>
    <link rel="stylesheet" href="menu.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@400;700&family=Playfair+Display:wght@400;700&family=Bebas+Neue&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="menu-container">
        <nav class="genre-list">
            <a href="#" class="genre-item" data-genre="hits">
                <span class="genre-name">Hits</span>
                <span class="arrow">
                    <svg viewBox="0 0 100 24" preserveAspectRatio="none">
                    <line x1="0" y1="12" x2="90" y2="12" stroke="currentColor" stroke-width="2"/>
                    <polyline points="80,4 92,12 80,20" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </span>
            </a>
            <a href="#" class="genre-item" data-genre="pop">
                <span class="genre-name">Pop</span>
                <span class="arrow">
                    <svg viewBox="0 0 100 24" preserveAspectRatio="none">
                    <line x1="0" y1="12" x2="90" y2="12" stroke="currentColor" stroke-width="2"/>
                    <polyline points="80,4 92,12 80,20" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </span>
            </a>
            <a href="#" class="genre-item" data-genre="rnb">
                <span class="genre-name">R&B</span>
                <span class="arrow">
                    <svg viewBox="0 0 100 24" preserveAspectRatio="none">
                    <line x1="0" y1="12" x2="90" y2="12" stroke="currentColor" stroke-width="2"/>
                    <polyline points="80,4 92,12 80,20" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </span>
            </a>
            <a href="#" class="genre-item" data-genre="rap">
                <span class="genre-name">HIPHOP/RAP</span>
                <span class="arrow">
                    <svg viewBox="0 0 100 24" preserveAspectRatio="none">
                    <line x1="0" y1="12" x2="90" y2="12" stroke="currentColor" stroke-width="2"/>
                    <polyline points="80,4 92,12 80,20" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </span>
            </a>
            <a href="#" class="genre-item" data-genre="kpop">
                <span class="genre-name">K-pop</span>
                <span class="arrow">
                    <svg viewBox="0 0 100 24" preserveAspectRatio="none">
                    <line x1="0" y1="12" x2="90" y2="12" stroke="currentColor" stroke-width="2"/>
                    <polyline points="80,4 92,12 80,20" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </span>
            </a>
        </nav>
    </main>

    <script src="menu.js"></script>
</body>
</html>
