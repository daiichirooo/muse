<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muse - Welcome</title>
    <link rel="stylesheet" href="welcome.css">
</head>
<body>

    <div class="welcome-container">

        <div class="words-container">
            <div class="word" id="music-word">
            <span>Music.</span>
            </div>
            <div class="word" id="browse-word">
            <span>Browse.</span>
            </div>
        </div>


        <div class="muse-container">
            <span>Mus</span>
            <span class="spinning-char" id="spinning-char">e</span>
        </div>
    </div>


    <div class="main-content">
        <main class="index-container">
            <h1 class="headline">Discover music<br>differently.</h1>
            <p class="description">
            Muse lets you drift through albums,<br>
            Follow your curiosity,<br>
            and Explore without limits.
            </p>
            <button id="diveInBtn" class="dive-in-btn">Dive in</button>
        </main>
    </div>

    <script src="welcome.js"></script>
</body>
</html>
