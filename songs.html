<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muse - Songs</title>
    <link rel="stylesheet" href="songs.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@400;700&family=Playfair+Display:wght@400;700&family=Bebas+Neue&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="songs-container">

        <a href="#" class="back-arrow" id="backBtn">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>


        <main class="albums-stage" id="albumsStage">
            <div class="album-item" id="album-1"></div>
            <div class="album-item" id="album-2"></div>
            <div class="album-item" id="album-3"></div>
            <div class="album-item" id="album-4"></div>
            <div class="album-item" id="album-5"></div>
            <div class="album-item" id="album-6"></div>
            <div class="album-item" id="album-7"></div>
            <div class="album-item" id="album-8"></div>
            <div class="album-item" id="album-9"></div>
            <div class="album-item" id="album-10"></div>
            <div class="album-item" id="album-11"></div>
            <div class="album-item" id="album-12"></div>
            <div class="album-item" id="album-13"></div>
            <div class="album-item" id="album-14"></div>
            <div class="album-item" id="album-15"></div>
            <div class="album-item" id="album-16"></div>
            <div class="album-item" id="album-17"></div>
            <div class="album-item" id="album-18"></div>
            <div class="album-item" id="album-19"></div>
            <div class="album-item" id="album-20"></div>
            <div class="album-item" id="album-21"></div>
            <div class="album-item" id="album-22"></div>
            <div class="album-item" id="album-23"></div>
            <div class="album-item" id="album-24"></div>
            <div class="album-item" id="album-25"></div>
            <div class="loading" id="loadingMessage">Loading albums...</div>
        </main>
    </div>


    <div class="custom-cursor" id="customCursor"></div>

    <script src="songs.js"></script>
</body>
</html>
